name: Bilibili Video Forwarder

on:
  workflow_dispatch:
  schedule:
    - cron: "10 * * * *"

permissions:
  contents: write

concurrency:
  group: bilibili-video-forwarder
  cancel-in-progress: false

jobs:
  bilibili-video-forwarder:
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      BILIBILI_COOKIE: ${{ secrets.BILIBILI_COOKIE }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Check Bilibili channels
        run: |
          python scripts/bilibili_video_forwarder.py \
            --state-file data/bilibili_state.json

      - name: Commit state
        if: always()
        run: |
          if [[ -n "$(git status --short data/bilibili_state.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/bilibili_state.json
            git commit -m "Update Bilibili video state"
            git push
          fi
